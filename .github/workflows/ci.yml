name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install API dependencies
        run: python -m pip install -r apps/api/requirements-dev.txt

      - name: Run API tests
        run: python -m pytest apps/api/tests

  web:
    name: Web (lint + types + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Ensure an ESLint config exists
        # The repo does not yet commit an ESLint config, and `next lint` would
        # otherwise prompt interactively and hang CI. Write a minimal config in
        # the runner so linting is deterministic and non-interactive. Remove this
        # step once a committed eslint config (e.g. apps/web/.eslintrc.json) lands.
        run: |
          if [ ! -f apps/web/.eslintrc.json ] && [ ! -f apps/web/eslint.config.mjs ] && [ ! -f apps/web/eslint.config.js ]; then
            printf '{\n  "extends": "next/core-web-vitals"\n}\n' > apps/web/.eslintrc.json
          fi

      - name: Lint
        run: npm --workspace apps/web run lint

      - name: Type-check
        run: npx --workspace apps/web tsc --noEmit

      - name: Unit tests
        run: npm --workspace apps/web run test -- --run
