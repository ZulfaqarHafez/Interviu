name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tracked files for secret patterns
        shell: pwsh
        run: ./scripts/check-secrets.ps1

  api:
    name: API (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install API dependencies
        run: python -m pip install -r apps/api/requirements-dev.txt

      - name: Run API tests
        run: python -m pytest apps/api/tests

  web:
    name: Web (lint + types + tests + e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Set up Python 3.11 for e2e API
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/api/requirements-dev.txt

      - name: Install API dependencies for e2e
        run: python -m pip install -r apps/api/requirements-dev.txt

      - name: Lint
        run: npx eslint apps/web/src

      - name: Type-check
        run: npx --workspace apps/web tsc --noEmit

      - name: Unit tests
        run: npm --workspace apps/web run test -- --run

      - name: Build
        run: npm --workspace apps/web run build

      - name: Install Playwright Chromium
        run: npx --workspace apps/web playwright install --with-deps chromium

      - name: Start deterministic API for e2e
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath pwsh -ArgumentList @("-NoProfile", "-File", "./scripts/start-e2e-api.ps1") -PassThru
          $proc.Id | Set-Content api.pid
          for ($i = 0; $i -lt 30; $i++) {
            Start-Sleep -Seconds 1
            try {
              $health = Invoke-RestMethod -Uri "http://127.0.0.1:8010/health" -TimeoutSec 2
              if ($health.ok -and -not $health.openai_configured) { exit 0 }
            } catch {}
          }
          throw "E2E API did not become ready in deterministic mode"

      - name: Playwright e2e
        env:
          NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8010
        run: npm --workspace apps/web run test:e2e -- --workers=1
